<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Job Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 430px; min-height: 300px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #111; background: #fff; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #e5e7eb; gap: 8px; }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; white-space: nowrap; }
  .logo span { color: #1d4ed8; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .stats { display: flex; gap: 10px; }
  .stat { text-align: center; }
  .stat-num { font-size: 17px; font-weight: 600; color: #111; line-height: 1; }
  .stat-label { font-size: 10px; color: #6b7280; margin-top: 1px; text-transform: uppercase; letter-spacing: 0.04em; }
  .trello-badge { display: flex; align-items: center; gap: 4px; background: #0052cc; color: #fff; font-size: 11px; font-weight: 500; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: none; white-space: nowrap; }
  .trello-badge:hover { background: #003d99; }

  .tabs { display: flex; border-bottom: 1px solid #e5e7eb; padding: 0 16px; }
  .tab { padding: 8px 0; margin-right: 16px; font-size: 12px; font-weight: 500; color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; background: none; border-left: none; border-right: none; border-top: none; }
  .tab.active { color: #1d4ed8; border-bottom-color: #1d4ed8; }
  .panel { display: none; }
  .panel.active { display: block; }

  .filters { display: flex; gap: 5px; padding: 8px 16px; border-bottom: 1px solid #f3f4f6; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 3px 8px; border-radius: 99px; border: 1px solid #e5e7eb; background: #fff; color: #6b7280; cursor: pointer; }
  .filter-btn.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

  .job-list { max-height: 370px; overflow-y: auto; }
  .job-item { padding: 9px 16px; border-bottom: 1px solid #f3f4f6; }
  .job-item:hover { background: #f9fafb; }
  .job-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .job-title { font-weight: 500; font-size: 13px; color: #111; line-height: 1.3; }
  .job-company { font-size: 12px; color: #374151; margin-top: 1px; }
  .job-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin: 3px 0; }
  .source-badge { font-size: 10px; padding: 1px 6px; border-radius: 99px; font-weight: 500; }
  .source-seek { background: #fef3c7; color: #92400e; }
  .source-linkedin { background: #dbeafe; color: #1e40af; }
  .location { font-size: 11px; color: #6b7280; }
  .date { font-size: 10px; color: #9ca3af; }
  .status-select { font-size: 10px; padding: 2px 4px; border: 1px solid #e5e7eb; border-radius: 4px; background: #fff; color: #374151; cursor: pointer; outline: none; }
  .job-link { font-size: 11px; color: #1d4ed8; text-decoration: none; }
  .job-link:hover { text-decoration: underline; }
  .del-btn { font-size: 11px; color: #d1d5db; background: none; border: none; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
  .del-btn:hover { color: #ef4444; }

  /* Trello sync status indicator */
  .trello-status { font-size: 10px; font-weight: 600; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
  .trello-status.synced   { background: #dcfce7; color: #15803d; }
  .trello-status.unsynced { background: #f3f4f6; color: #9ca3af; }
  .trello-status.syncing { background: #dbeafe; color: #1d4ed8; animation: spin 1s linear infinite; }
  .trello-status.error   { background: #fee2e2; color: #b91c1c; cursor: help; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 36px 24px; color: #9ca3af; }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }
  .empty-title { font-size: 13px; font-weight: 500; color: #6b7280; margin-bottom: 4px; }
  .empty-sub { font-size: 12px; line-height: 1.5; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px 16px; }
  .stat-card { background: #f9fafb; border-radius: 8px; padding: 10px 12px; }
  .stat-card-num { font-size: 22px; font-weight: 600; color: #111; }
  .stat-card-label { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .source-breakdown { padding: 0 16px 12px; }
  .breakdown-title { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .breakdown-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
  .breakdown-bar-wrap { height: 4px; background: #f3f4f6; border-radius: 2px; margin: 3px 0 8px; }
  .breakdown-bar { height: 4px; border-radius: 2px; background: #1d4ed8; }

  footer { padding: 8px 16px; border-top: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center; }
  .export-btn { font-size: 11px; color: #6b7280; background: none; border: 1px solid #e5e7eb; border-radius: 4px; padding: 4px 8px; cursor: pointer; }
  .export-btn:hover { background: #f9fafb; color: #111; }
  .clear-btn { font-size: 11px; color: #ef4444; background: none; border: none; cursor: pointer; }
  .clear-btn:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <div class="logo">Job <span>Clipper</span></div>
  <div class="header-right">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="hdr-total">0</div><div class="stat-label">Saved</div></div>
      <div class="stat"><div class="stat-num" id="hdr-applied">0</div><div class="stat-label">Applied</div></div>
      <div class="stat"><div class="stat-num" id="hdr-interview">0</div><div class="stat-label">Interview</div></div>
    </div>
    <button class="trello-badge" id="trello-board-link">Connect Trello</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="jobs">Jobs</button>
  <button class="tab" data-tab="stats">Stats</button>
</div>

<div class="panel active" id="panel-jobs">
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="saved">Saved</button>
    <button class="filter-btn" data-filter="applied">Applied</button>
    <button class="filter-btn" data-filter="interview">Interview</button>
    <button class="filter-btn" data-filter="offer">Offer</button>
    <button class="filter-btn" data-filter="rejected">Rejected</button>
    <button class="filter-btn" data-filter="seek">Seek</button>
    <button class="filter-btn" data-filter="linkedin">LinkedIn</button>
  </div>
  <div class="job-list" id="job-list"></div>
</div>

<div class="panel" id="panel-stats">
  <div class="stats-grid" id="stats-grid"></div>
  <div class="source-breakdown" id="source-breakdown"></div>
</div>

<footer>
  <div style="display:flex;gap:6px;">
    <button class="export-btn" id="export-btn">Export CSV</button>
    <button class="export-btn" id="export-json-btn">Export JSON</button>
    <button class="export-btn" id="import-btn">Import</button>
    <input type="file" id="import-file" accept=".json,application/json" style="display:none;" />
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="export-btn" id="settings-btn" title="Settings">&#9881;</button>
    <button class="clear-btn" id="clear-btn">Clear all</button>
  </div>
</footer>

<script src="popup.js"></script>
</body>
</html>
